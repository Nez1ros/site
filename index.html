                // Функция генерации даты ТОЛЬКО 2026 год (с 1 января по 22 марта)
                function randomDate2026() {
                    const start = new Date(2026, 0, 1);     // 1 января 2026
                    const end = new Date(2026, 2, 22);     // 22 марта 2026 (текущая дата)
                    const randomTime = start.getTime() + Math.random() * (end.getTime() - start.getTime());
                    const date = new Date(randomTime);
                    const day = date.getDate();
                    const months = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];
                    const monthName = months[date.getMonth()];
                    const year = date.getFullYear();
                    return `${day} ${monthName} ${year}`;
                }

                    if (Math.random() > 0.6) return emojis[Math.floor(Math.random() * emojis.length)];
                    return name.charAt(0).toUpperCase();

                    // Иногда добавляем ID сделки, если его нет
                    if (Math.random() > 0.7 && !reviewText.includes("✅ Сделка #")) {
                        reviewText += " ✅ Сделка #" + (Math.floor(Math.random() * 9999) + 1000);
                    }
                    let starRating = getStars();
                    let dateStr = randomDate2026();

                            </div>
                        </div>
                    `;
                }
        
                function escapeHtml(str) {
                    return str.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                }
        
                document.getElementById('dynamicReviews').innerHTML = reviewsHTML;
        
                const sections = {

                };

                function setActiveSection(sectionId, clickedBtn) {
                    Object.values(sections).forEach(sec => sec.classList.remove('active'));
                    sections[sectionId].classList.add('active');
                    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
                    if (clickedBtn) clickedBtn.classList.add('active');
                    else {
                        const corr = document.querySelector(`.nav-item[data-nav="${sectionId}"]`);
                        if (corr) corr.classList.add('active');
                    }
                    if (scrollContainer) scrollContainer.scrollTop = 0;
                }
                navBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const target = btn.getAttribute('data-nav');

                floatingBtn.addEventListener('click', openModal);
                closeModalBtn.addEventListener('click', closeModal);

                // Canvas фон с частицами
                const canvas = document.getElementById('canvas-bg');
                const ctx = canvas.getContext('2d');
                let width = window.innerWidth, height = window.innerHeight;
                let particles = [];
                let mouseX = 0, mouseY = 0;
                const PARTICLE_COUNT = 180;
                function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; initParticles(); }
                function initParticles() { particles = []; for(let i=0;i<PARTICLE_COUNT;i++) particles.push({ x: Math.random()*width, y: Math.random()*height, vx: (Math.random()-0.5)*0.25, vy: (Math.random()-0.5)*0.25, size: Math.random()*2.5+1, alpha: Math.random()*0.5+0.2, color: `hsla(${Math.random()*60+180}, 80%, 65%, ${Math.random()*0.3+0.2})` }); }
                function updateParticles() { for(let p of particles) { p.x += p.vx; p.y += p.vy; const dx = mouseX - p.x, dy = mouseY - p.y, dist = Math.hypot(dx,dy); if(dist<200){ const force=(200-dist)/200*0.05; p.vx+=dx*force*0.001; p.vy+=dy*force*0.001; } if(Math.abs(p.vx)>0.6) p.vx=p.vx>0?0.6:-0.6; if(Math.abs(p.vy)>0.6) p.vy=p.vy>0?0.6:-0.6; if(p.x<-50) p.x=width+50; if(p.x>width+50) p.x=-50; if(p.y<-50) p.y=height+50; if(p.y>height+50) p.y=-50; } }
                function drawParticles() { ctx.clearRect(0,0,width,height); const grad=ctx.createLinearGradient(0,0,width,height); grad.addColorStop(0,'rgba(10,26,47,0.4)'); grad.addColorStop(1,'rgba(3,13,26,0.6)'); ctx.fillStyle=grad; ctx.fillRect(0,0,width,height); for(let p of particles){ ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fillStyle=p.color; ctx.shadowBlur=8; ctx.shadowColor='rgba(100,200,255,0.5)'; ctx.fill(); } ctx.shadowBlur=0; ctx.beginPath(); ctx.strokeStyle='rgba(100,200,255,0.1)'; ctx.lineWidth=0.5; for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){ const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y; if(Math.hypot(dx,dy)<90){ ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); } } }
                function animateBg() { updateParticles(); drawParticles(); requestAnimationFrame(animateBg); }
                window.addEventListener('resize', resizeCanvas);
                window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
                resizeCanvas(); animateBg();
            })();
        </script>

<script>
    (function() {
        const iframe = document.getElementById('contentFrame');
        const btnMain = document.getElementById('btnSiteMain');
        const btnRkn = document.getElementById('btnRknRegistry');
        const loader = document.getElementById('iframeLoader');
        
        // Получаем HTML из шаблонов
        const mainTemplate = document.getElementById('templateMainSite');
        const rknTemplate = document.getElementById('templateRknPage');
        
        let currentBlobUrl = null;
        
        function setIframeContent(htmlContent, isMain) {
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            // показать лоадер на мгновение (необязательно)
            if (loader) loader.style.display = 'block';
            setTimeout(() => { if(loader) loader.style.display = 'none'; }, 300);
            
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            currentBlobUrl = blobUrl;
            iframe.src = blobUrl;
            
            // меняем активный класс кнопок
            if (isMain) {
                btnMain.classList.add('active');
                btnRkn.classList.remove('active');
            } else {
                btnRkn.classList.add('active');
                btnMain.classList.remove('active');
            }
        }
        
        // извлекаем содержимое template
        function getTemplateContent(templateEl) {
            // template.content — DocumentFragment, нужно получить его innerHTML
            const fragment = templateEl.content;
            // Создаем временный элемент для сериализации
            const div = document.createElement('div');
            div.appendChild(fragment.cloneNode(true));
            return div.innerHTML;
        }
        
        // Загружаем основной сайт по умолчанию
        const mainHtml = getTemplateContent(mainTemplate);
        const rknHtml = getTemplateContent(rknTemplate);
        
        btnMain.addEventListener('click', () => {
            setIframeContent(mainHtml, true);
        });
        
        btnRkn.addEventListener('click', () => {
            setIframeContent(rknHtml, false);
        });
        
        // Инициализация: показываем главный сайт
        setIframeContent(mainHtml, true);
        
        // Защита от двойного создания blob (чистим при уходе со страницы)
        window.addEventListener('beforeunload', () => {
            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        });
    })();
</script>
